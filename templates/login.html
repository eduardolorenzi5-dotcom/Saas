<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Login — Controla Fácil</title><link rel="stylesheet" href="/static/css/site.css"/></head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Entrar</h2>
    <p class="sub">Bem-vindo de volta</p>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
    <form method="POST">
      <div class="field"><label>E-mail</label><input type="email" name="email" placeholder="seu@email.com" required/></div>
      <div class="field"><label>Senha</label><input type="password" name="senha" placeholder="Sua senha" required/></div>
      <button type="submit" class="btn-primary btn-block" style="margin-top:8px;">Entrar</button>
    </form>
    <div class="auth-footer" style="margin-top:12px;"><a href="/esqueci-senha">Esqueci minha senha</a></div>
    <div class="auth-footer">Não tem conta? <a href="/cadastro">Criar conta</a></div>
  </div>
</div>
</body></html>
