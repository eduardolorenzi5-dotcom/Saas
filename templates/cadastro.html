<!-- cadastro.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head><link rel="icon" type="image/x-icon" href="/static/favicon.ico"/>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Cadastro — Controla Fácil</title><link rel="stylesheet" href="/static/css/site.css"/>
  <style>
    .btn-google-cad {
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; padding:12px; background:#fff; color:#3c4043;
      border:1.5px solid #dadce0; border-radius:8px;
      font-size:14px; font-weight:600; text-decoration:none; margin-bottom:4px;
      transition:box-shadow .2s;
    }
    .btn-google-cad:hover { box-shadow:0 2px 8px rgba(0,0,0,.15); }
    .btn-google-cad svg { width:20px; height:20px; }
    .divider-cad { display:flex; align-items:center; gap:10px; margin:14px 0; color:#aaa; font-size:12px; }
    .divider-cad::before,.divider-cad::after { content:''; flex:1; height:1px; background:#e5e5e3; }
  </style>
  {% if META_PIXEL_ID %}
  <script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '{{ META_PIXEL_ID }}');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id={{ META_PIXEL_ID }}&ev=PageView&noscript=1"/></noscript>
  {% endif %}
  {% if GA_MEASUREMENT_ID %}
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA_MEASUREMENT_ID }}"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "{{ GA_MEASUREMENT_ID }}");
  </script>
  {% endif %}
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Criar conta</h2>
    <p class="sub">Comece a controlar seus gastos hoje</p>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}

    <a href="/auth/google?state=cadastro" class="btn-google-cad">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Cadastrar com Google
    </a>
    <div class="divider-cad">ou preencha o formulário</div>

    <form method="POST">
      <div class="field"><label>Nome completo</label><input type="text" name="nome" placeholder="Seu nome" value="{{ google_nome or '' }}" required/></div>
      <div class="field"><label>E-mail</label><input type="email" name="email" placeholder="seu@email.com" value="{{ google_email or '' }}" {% if google_email %}readonly style="background:#f4f4f2;color:#888;"{% endif %} required/></div>
      {% if not google_email %}
      <div class="field">
        <label>Senha</label>
        <div style="position:relative;">
          <input type="password" name="senha" id="senha-cad" placeholder="Mínimo 6 caracteres" required style="padding-right:44px;width:100%;box-sizing:border-box;"/>
          <button type="button" onclick="toggleSenhaCad()" title="Mostrar/ocultar senha"
            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b7280;padding:4px;display:flex;align-items:center;">
            <svg id="eye-cad" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>
      {% endif %}
      <div class="field"><label>WhatsApp (com DDD)</label><input type="text" name="whatsapp" placeholder="11999999999" required/></div>
      <div class="field"><label>Plano</label>
        <select name="plano_id" required>
          {% for plano in planos %}
          <option value="{{ plano.id }}">{{ plano.nome }} — R$ {{ "%.2f"|format(plano.preco) }}/mês</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn-primary btn-block" style="margin-top:8px;">Continuar para pagamento</button>
    </form>
    <div class="auth-footer">Já tem conta? <a href="/login">Entrar</a></div>
  </div>
</div>
<script>
function toggleSenhaCad() {
  const input = document.getElementById('senha-cad');
  const icon = document.getElementById('eye-cad');
  const btn = icon.parentElement;
  if (input.type === 'password') {
    input.type = 'text';
    btn.style.color = '#a78bfa';
    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
  } else {
    input.type = 'password';
    btn.style.color = '#6b7280';
    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
  }
}
</script>
<a href="https://wa.me/5561998007328" target="_blank" rel="noopener" class="wpp-float" title="Falar no WhatsApp">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>
</body></html>
