<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico"/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — Controla Fácil</title>
  <link rel="stylesheet" href="/static/css/site.css"/>
</head>
<body>
<div class="pag-wrap">
  <div class="pag-card" style="max-width:360px;">
    <h2 style="margin-bottom:20px;">Painel Admin</h2>
    {% if erro %}<div class="erro" style="margin-bottom:16px;">{{ erro }}</div>{% endif %}
    <form method="POST">
      <div class="field"><label>Chave de acesso</label><input type="password" name="key" placeholder="••••••••" autofocus/></div>
      <button type="submit" class="btn-primary btn-block">Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
